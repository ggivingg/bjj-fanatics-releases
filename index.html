<style>
  :root {
    --bg: #06060a;
    --s1: #0d0d16;
    --s2: #12121c;
    --border: #1a1a2c;
    --text: #c8d8ee;
    --muted: #3a4460;
    --muted2: #5a6888;
    --accent: #f0d000;
    --c-Guard:          #4499ff;
    --c-Submissions:    #ff3355;
    --c-Guard-Passing:  #33dd88;
    --c-Wrestling:      #ff8833;
    --c-Striking:       #dd44ff;

    --c-Escapes:        #33ccff;
    --c-Takedowns:      #ff6644;
    --c-Conditioning:   #88ff44;
    --c-Other:          #445566;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; display: flex; flex-direction: column; }

  /* ── Header ── */
  header {
    flex-shrink: 0; padding: 0.85rem 1.5rem 0.65rem;
    background: var(--s1); border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-end; gap: 1.5rem; flex-wrap: wrap;
  }
  header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 1.9rem; letter-spacing: 0.08em; color: var(--accent); line-height: 1; }
  .hsub { font-family: 'IBM Plex Mono', monospace; font-size: 0.55rem; color: var(--muted2); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 2px; }
  .hstats { display: flex; gap: 1.5rem; margin-left: auto; }
  .hstat { font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; text-align: right; }
  .hstat-v { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--accent); letter-spacing: 0.06em; display: block; line-height: 1; }
  .hstat-k { color: var(--muted2); font-size: 0.52rem; letter-spacing: 0.1em; text-transform: uppercase; }

  /* ── Controls ── */
  .controls {
    flex-shrink: 0; padding: 0.5rem 1.5rem;
    background: var(--s2); border-bottom: 1px solid var(--border);
    display: flex; gap: 14px; align-items: center; flex-wrap: wrap;
  }
  .ctrl-label { font-family: 'IBM Plex Mono', monospace; font-size: 0.55rem; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.1em; }
  .view-btns { display: flex; border: 1px solid var(--border); border-radius: 2px; overflow: hidden; }
  .vbtn { padding: 0.28rem 0.85rem; font-family: 'IBM Plex Mono', monospace; font-size: 0.57rem; letter-spacing: 0.06em; text-transform: uppercase; background: none; border: none; color: var(--muted2); cursor: pointer; transition: all 0.15s; border-right: 1px solid var(--border); }
  .vbtn:last-child { border-right: none; }
  .vbtn.active { background: var(--accent); color: #000; }
  .vbtn:hover:not(.active) { color: var(--text); }
  input[type=text] { background: var(--s1); border: 1px solid var(--border); color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; padding: 0.26rem 0.65rem; border-radius: 2px; outline: none; width: 190px; transition: border-color 0.2s; }
  input[type=text]:focus { border-color: var(--accent); }
  input[type=text]::placeholder { color: var(--muted); }
  .legend { display: flex; gap: 5px; flex-wrap: wrap; }
  .leg { display: flex; align-items: center; gap: 4px; font-family: 'IBM Plex Mono', monospace; font-size: 0.5rem; color: var(--muted2); cursor: pointer; padding: 2px 5px; border-radius: 2px; border: 1px solid transparent; transition: all 0.15s; }
  .leg:hover { color: var(--text); border-color: var(--border); }
  .leg.off { opacity: 0.25; }
  .leg-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .showing { font-family: 'IBM Plex Mono', monospace; font-size: 0.55rem; color: var(--muted2); margin-left: auto; }
  .showing em { color: var(--accent); font-style: normal; }

  /* ── Main layout ── */
  .workspace { flex: 1; display: grid; grid-template-columns: 1fr 280px; min-height: 0; overflow: hidden; }

  /* ── Chart ── */
  .chart-wrap { position: relative; overflow: hidden; display: flex; flex-direction: column; }

  /* Scrollable timeline row */
  .timeline-scroll { flex: 1; overflow-x: auto; overflow-y: hidden; position: relative; cursor: grab; }
  .timeline-scroll:active { cursor: grabbing; }
  .timeline-scroll::-webkit-scrollbar { height: 5px; }
  .timeline-scroll::-webkit-scrollbar-track { background: var(--bg); }
  .timeline-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  svg#chart { display: block; }

  /* ── Tooltip ── */
  .tooltip {
    position: fixed; pointer-events: none;
    background: rgba(10,10,18,0.97); border: 1px solid #2a2a40;
    border-radius: 3px; padding: 0.8rem 1rem;
    max-width: 300px; box-shadow: 0 12px 40px rgba(0,0,0,0.8);
    opacity: 0; transition: opacity 0.12s; z-index: 999;
    font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem;
  }
  .tt-month { color: var(--accent); font-size: 0.55rem; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 5px; }
  .tt-count { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--text); letter-spacing: 0.05em; line-height: 1; margin-bottom: 6px; }
  .tt-count small { font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; color: var(--muted2); font-weight: 400; }
  .tt-cats { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 8px; }
  .tt-cat { padding: 1px 5px; border-radius: 2px; font-size: 0.5rem; }
  .tt-titles { color: var(--muted2); line-height: 1.9; font-size: 0.56rem; border-top: 1px solid #1a1a2c; padding-top: 6px; }
  .tt-title-item { color: var(--text); }
  .tt-title-instr { color: var(--muted2); }

  /* ── Side panel ── */
  .side { border-left: 1px solid var(--border); background: var(--s1); display: flex; flex-direction: column; overflow: hidden; }
  .side-tabs { display: flex; border-bottom: 1px solid var(--border); }
  .stab { flex: 1; padding: 0.5rem; font-family: 'IBM Plex Mono', monospace; font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.08em; text-align: center; cursor: pointer; color: var(--muted2); background: none; border: none; border-bottom: 2px solid transparent; transition: all 0.15s; }
  .stab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .side-body { flex: 1; overflow-y: auto; }
  .side-body::-webkit-scrollbar { width: 3px; }
  .side-body::-webkit-scrollbar-thumb { background: var(--border); }

  /* Instructor list */
  .instr-item { display: flex; align-items: center; gap: 8px; padding: 5px 1rem; cursor: pointer; transition: background 0.1s; border-bottom: 1px solid rgba(26,26,44,0.5); }
  .instr-item:hover { background: var(--s2); }
  .instr-item.hl { background: rgba(240,208,0,0.06); border-left: 2px solid var(--accent); }
  .instr-rank { font-family: 'IBM Plex Mono', monospace; font-size: 0.5rem; color: var(--muted); min-width: 18px; }
  .instr-info { flex: 1; min-width: 0; }
  .instr-name { font-family: 'IBM Plex Mono', monospace; font-size: 0.58rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
  .instr-bar { height: 2px; border-radius: 2px; background: var(--accent); }
  .instr-n { font-family: 'IBM Plex Mono', monospace; font-size: 0.58rem; color: var(--muted2); min-width: 24px; text-align: right; }

  /* Month list */
  .month-row { padding: 5px 1rem; border-bottom: 1px solid rgba(26,26,44,0.6); cursor: pointer; }
  .month-row:hover { background: var(--s2); }
  .month-top { display: flex; align-items: baseline; gap: 6px; }
  .month-name { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; color: var(--text); letter-spacing: 0.05em; }
  .month-n { font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; color: var(--accent); }
  .month-bar { height: 2px; background: linear-gradient(to right, var(--accent), transparent); margin: 3px 0; border-radius: 2px; }
  .month-titles-list { display: none; font-family: 'IBM Plex Mono', monospace; font-size: 0.53rem; color: var(--muted2); line-height: 2; padding-top: 3px; }
  .month-row.open .month-titles-list { display: block; }
</style>
</head>

const CAT_COLORS = {
  'Guard':         '#4499ff',
  'Submissions':   '#ff3355',
  'Guard Passing': '#33dd88',
  'Wrestling':     '#ff8833',
  'Striking':      '#dd44ff',
  'Judo':          '#ffcc33',
  'Escapes':       '#33ccff',
  'Takedowns':     '#ff6644',
  'Conditioning':  '#88ff44',
  'Other':         '#445566',
};
const CATS = Object.keys(CAT_COLORS);

let activeCats = new Set(CATS);
let hlInstructor = null;
let searchQ = '';
let currentView = 'bars';
let sideTab = 'instructors';

// ── Filter ─────────────────────────────────────────────────────────────
function filteredProducts() {
  const q = searchQ.toLowerCase();
  return DATA.products.filter(p => {
    if (!activeCats.has(p.c)) return false;
    if (hlInstructor && p.i !== hlInstructor) return false;
    if (q && !p.t.toLowerCase().includes(q) && !p.i.toLowerCase().includes(q)) return false;
    return true;
  });
}

function filteredMonthly() {
  const fp = filteredProducts();
  const byMonth = {};
  DATA.monthly.forEach(m => {
    byMonth[m.month] = { month: m.month, total: 0, cats: {}, running: 0, top: m.top };
    CATS.forEach(c => { byMonth[m.month].cats[c] = 0; });
  });
  let run = 0;
  fp.forEach(p => {
    const ym = p.d.slice(0,7);
    if (!byMonth[ym]) return;
    byMonth[ym].total++;
    byMonth[ym].cats[p.c] = (byMonth[ym].cats[p.c]||0) + 1;
  });
  const sorted = Object.values(byMonth).sort((a,b) => a.month.localeCompare(b.month));
  sorted.forEach(m => { run += m.total; m.running = run; });
  return sorted;
}

// ── Legend ──────────────────────────────────────────────────────────────
function buildLegend() {
  const el = document.getElementById('legend');
  CATS.forEach(cat => {
    const d = document.createElement('div');
    d.className = 'leg'; d.id = 'leg_' + cat.replace(/ /g,'_');
    d.innerHTML = `<div class="leg-dot" style="background:${CAT_COLORS[cat]}"></div>${cat}`;
    d.onclick = () => {
      if (activeCats.has(cat)) activeCats.delete(cat); else activeCats.add(cat);
      d.classList.toggle('off', !activeCats.has(cat));
      render();
    };
    el.appendChild(d);
  });
  // Set instructor count
  const instructors = new Set(DATA.products.map(p=>p.i).filter(Boolean));
  document.getElementById('h-instructors').textContent = instructors.size;
}

// ── Main render ─────────────────────────────────────────────────────────
function render() {
  const fp = filteredProducts();
  document.getElementById('showing').textContent = fp.length.toLocaleString();

  const monthly = filteredMonthly();

  if (currentView === 'bars') renderBars(monthly, fp);
  else if (currentView === 'area') renderArea(monthly, fp);
  else renderDots(fp);

  renderSide(fp, monthly);
}

// ── BARS: monthly releases, stacked by category ─────────────────────────
function renderBars(monthly, fp) {
  const MONTH_W = 28;  // px per month column
  const totalW = Math.max(monthly.length * MONTH_W + 120, window.innerWidth - 290);
  const H = document.querySelector('.chart-wrap').clientHeight;
  const margin = { top: 55, right: 60, bottom: 70, left: 55 };
  const w = totalW - margin.left - margin.right;
  const h = H - margin.top - margin.bottom;

  const svg = d3.select('#chart').attr('width', totalW).attr('height', H);
  svg.selectAll('*').remove();
  const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

  const months = monthly.map(m => m.month);
  const xScale = d3.scaleBand().domain(months).range([0, w]).padding(0.18);

  const maxVal = d3.max(monthly, m => m.total) || 1;
  const yScale = d3.scaleLinear().domain([0, maxVal * 1.08]).range([h, 0]).nice();

  const activeCatList = CATS.filter(c => activeCats.has(c));
  const stack = d3.stack().keys(activeCatList).offset(d3.stackOffsetNone);
  const series = stack(monthly.map(m => {
    const row = { month: m.month };
    CATS.forEach(c => row[c] = m.cats[c] || 0);
    return row;
  }));

  // ── Year bands + labels ──
  const years = [...new Set(months.map(m => m.slice(0,4)))];
  years.forEach((yr, yi) => {
    const mInYear = months.filter(m => m.startsWith(yr));
    if (!mInYear.length) return;
    const x0 = xScale(mInYear[0]);
    const x1 = xScale(mInYear[mInYear.length-1]) + xScale.bandwidth();
    // Alternating band
    if (yi % 2 === 0) {
      g.append('rect').attr('x', x0).attr('y', 0).attr('width', x1-x0).attr('height', h)
        .attr('fill', 'rgba(255,255,255,0.014)');
    }
    // Year label at top
    g.append('text')
      .attr('x', x0 + (x1-x0)/2).attr('y', -30)
      .attr('text-anchor', 'middle')
      .attr('font-family', 'Bebas Neue').attr('font-size', 18).attr('letter-spacing', 3)
      .attr('fill', yi % 2 === 0 ? '#3a4878' : '#2a3460')
      .text(yr);
    // Vertical year divider
    g.append('line').attr('x1', x0).attr('x2', x0).attr('y1', -38).attr('y2', h)
      .attr('stroke', '#1e1e30').attr('stroke-width', 1);
  });

  // ── Horizontal grid lines ──
  g.append('g').call(
    d3.axisLeft(yScale).tickSize(-w).tickFormat('').ticks(6)
  ).selectAll('line').attr('stroke', '#151525').attr('stroke-width', 1);
  g.select('.domain').remove();

  // ── Stacked bars ──
  const tt = document.getElementById('tooltip');
  series.forEach(s => {
    g.selectAll(null).data(s).join('rect')
      .attr('x', d => xScale(d.data.month))
      .attr('y', d => yScale(d[1]))
      .attr('height', d => Math.max(0, yScale(d[0]) - yScale(d[1])))
      .attr('width', xScale.bandwidth())
      .attr('fill', CAT_COLORS[s.key])
      .attr('opacity', 0.85)
      .on('mouseover', function(event, d) {
        const val = d[1] - d[0];
        if (!val) return;
        d3.select(this).attr('opacity', 1).attr('stroke', '#fff').attr('stroke-width', 0.5);
        const mdata = monthly.find(m => m.month === d.data.month);
        showTooltip(event, d.data.month, mdata, s.key, val);
      })
      .on('mousemove', (e) => moveTooltip(e))
      .on('mouseout', function() {
        d3.select(this).attr('opacity', 0.85).attr('stroke', 'none');
        tt.style.opacity = '0';
      });
  });

  // ── X axis: month ticks ──
  // Show every 3rd month label
  g.selectAll('.xlbl').data(months.filter((_,i)=>i%3===0)).join('text')
    .attr('class','xlbl')
    .attr('x', m => xScale(m) + xScale.bandwidth()/2)
    .attr('y', h + 16)
    .attr('text-anchor', 'middle')
    .attr('font-family', 'IBM Plex Mono').attr('font-size', 8).attr('fill', '#2a3450')
    .text(m => {
      const mo = parseInt(m.slice(5));
      return ['','J','F','M','A','M','J','J','A','S','O','N','D'][mo];
    });

  // ── Y axis ──
  const yAxis = g.append('g').call(
    d3.axisLeft(yScale).ticks(6).tickFormat(d3.format('d'))
  );
  yAxis.selectAll('text').attr('font-family','IBM Plex Mono').attr('font-size', 9).attr('fill','#3a4460');
  yAxis.select('.domain').remove();
  yAxis.selectAll('.tick line').remove();

  // Y axis label
  g.append('text').attr('transform','rotate(-90)').attr('x', -h/2).attr('y', -42)
    .attr('text-anchor','middle').attr('font-family','IBM Plex Mono').attr('font-size', 9)
    .attr('fill','#2a3450').attr('letter-spacing',2).text('RELEASES PER MONTH');

  // ── Title ──
  svg.append('text').attr('x', margin.left).attr('y', 20)
    .attr('font-family','IBM Plex Mono').attr('font-size', 9).attr('fill','#2a3450').attr('letter-spacing',2)
    .text('MONTHLY RELEASE COUNT — STACKED BY CATEGORY — CLICK LEGEND TO FILTER');

  // ── Peak annotation ──
  const peak = monthly.reduce((p,c) => c.total > p.total ? c : p, monthly[0]);
  if (peak) {
    const px = xScale(peak.month) + xScale.bandwidth()/2;
    const py = yScale(peak.total);
    g.append('line').attr('x1',px).attr('x2',px).attr('y1',py-4).attr('y2',py-22)
      .attr('stroke','#f0d000').attr('stroke-width',1).attr('stroke-dasharray','2,2');
    g.append('text').attr('x',px).attr('y',py-26).attr('text-anchor','middle')
      .attr('font-family','IBM Plex Mono').attr('font-size',8).attr('fill','#f0d000')
      .text(`peak: ${peak.total} (${peak.month})`);
  }
}

// ── AREA: cumulative releases over time ─────────────────────────────────
function renderArea(monthly, fp) {
  const MONTH_W = 26;
  const totalW = Math.max(monthly.length * MONTH_W + 120, window.innerWidth - 290);
  const H = document.querySelector('.chart-wrap').clientHeight;
  const margin = { top: 55, right: 60, bottom: 70, left: 65 };
  const w = totalW - margin.left - margin.right;
  const h = H - margin.top - margin.bottom;

  const svg = d3.select('#chart').attr('width', totalW).attr('height', H);
  svg.selectAll('*').remove();
  const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

  const months = monthly.map(m => m.month);
  const parseMonth = d => new Date(d + '-01');
  const xScale = d3.scaleTime()
    .domain([parseMonth(months[0]), parseMonth(months[months.length-1])])
    .range([0, w]);

  const maxRun = monthly[monthly.length-1]?.running || 1;
  const yScale = d3.scaleLinear().domain([0, maxRun * 1.03]).range([h, 0]).nice();

  // ── Per-category cumulative areas ──
  const catRuns = {};
  CATS.forEach(c => { catRuns[c] = 0; });
  const catData = monthly.map(m => {
    CATS.forEach(c => { catRuns[c] += m.cats[c]||0; });
    return { month: m.month, date: parseMonth(m.month), ...Object.fromEntries(CATS.map(c=>[c, catRuns[c]])), running: m.running };
  });

  // Stack for area
  const activeCatList = CATS.filter(c => activeCats.has(c));
  const stack = d3.stack().keys(activeCatList).offset(d3.stackOffsetNone);
  const series = stack(catData.map(d => {
    const row = { date: d.date };
    CATS.forEach(c => row[c] = d[c]);
    return row;
  }));

  const area = d3.area()
    .x(d => xScale(d.data.date))
    .y0(d => yScale(d[0]))
    .y1(d => yScale(d[1]))
    .curve(d3.curveMonotoneX);

  const line = d3.line()
    .x(d => xScale(d.data.date))
    .y(d => yScale(d[1]))
    .curve(d3.curveMonotoneX);

  // Year bands
  const years = [...new Set(months.map(m=>m.slice(0,4)))];
  years.forEach((yr,yi) => {
    const x0 = xScale(new Date(+yr, 0, 1));
    const x1 = xScale(new Date(+yr, 11, 31));
    if (yi%2===0) g.append('rect').attr('x',x0).attr('y',0).attr('width',x1-x0).attr('height',h).attr('fill','rgba(255,255,255,0.012)');
    g.append('text').attr('x',(x0+x1)/2).attr('y',-28)
      .attr('text-anchor','middle').attr('font-family','Bebas Neue').attr('font-size',17).attr('letter-spacing',3)
      .attr('fill', yi%2===0 ? '#3a4878' : '#2a3460').text(yr);
    if (yi>0) g.append('line').attr('x1',x0).attr('x2',x0).attr('y1',-36).attr('y2',h).attr('stroke','#1e1e30').attr('stroke-width',1);
  });

  // Grid
  g.append('g').call(d3.axisLeft(yScale).tickSize(-w).tickFormat('').ticks(8))
    .selectAll('line').attr('stroke','#111120').attr('stroke-width',1);
  g.select('.domain').remove();

  // Areas
  const tt = document.getElementById('tooltip');
  series.forEach(s => {
    g.append('path').datum(s).attr('d', area)
      .attr('fill', CAT_COLORS[s.key]).attr('opacity', 0.25);
    g.append('path').datum(s).attr('d', line)
      .attr('fill','none').attr('stroke', CAT_COLORS[s.key]).attr('stroke-width', 1).attr('opacity', 0.7);
  });

  // Total line on top
  const totalLine = d3.line().x(d=>xScale(d.date)).y(d=>yScale(d.running)).curve(d3.curveMonotoneX);
  g.append('path').datum(catData).attr('d', totalLine)
    .attr('fill','none').attr('stroke','#f0d000').attr('stroke-width', 2).attr('opacity', 0.9);

  // Milestone dots on total line
  const milestones = [100, 250, 500, 1000, 1500, 2000, 2500, 3000];
  milestones.forEach(n => {
    const m = catData.find(d => d.running >= n);
    if (!m) return;
    const cx = xScale(m.date), cy = yScale(m.running);
    g.append('circle').attr('cx',cx).attr('cy',cy).attr('r',4)
      .attr('fill','#f0d000').attr('stroke','#06060a').attr('stroke-width',2);
    g.append('text').attr('x',cx+6).attr('y',cy-6)
      .attr('font-family','IBM Plex Mono').attr('font-size',8).attr('fill','#f0d000').attr('opacity',0.8)
      .text(n.toLocaleString());
  });

  // Hover line
  const hoverLine = g.append('line').attr('stroke','#ffffff').attr('stroke-width',0.5).attr('stroke-dasharray','3,3').attr('opacity',0).attr('y1',0).attr('y2',h);
  const hoverDot = g.append('circle').attr('r',4).attr('fill','#f0d000').attr('stroke','#06060a').attr('stroke-width',2).attr('opacity',0);

  // Invisible overlay for hover
  g.append('rect').attr('width',w).attr('height',h).attr('opacity',0)
    .on('mousemove', function(event) {
      const [mx] = d3.pointer(event, this);
      const date = xScale.invert(mx);
      const ym = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`;
      const mdata = monthly.find(m => m.month === ym);
      if (!mdata) return;
      const cx = xScale(parseMonth(ym));
      hoverLine.attr('x1',cx).attr('x2',cx).attr('opacity',1);
      hoverDot.attr('cx',cx).attr('cy',yScale(mdata.running)).attr('opacity',1);
      showTooltip(event, ym, mdata, null, null, mdata.running);
    })
    .on('mouseout', () => {
      hoverLine.attr('opacity',0); hoverDot.attr('opacity',0);
      tt.style.opacity='0';
    });

  // Axes
  g.append('g').call(d3.axisLeft(yScale).ticks(8).tickFormat(d=>d>=1000?d/1000+'k':d))
    .selectAll('text').attr('font-family','IBM Plex Mono').attr('font-size',9).attr('fill','#3a4460');
  g.select('.domain').remove();
  g.selectAll('.tick line').remove();

  g.append('text').attr('transform','rotate(-90)').attr('x',-h/2).attr('y',-52)
    .attr('text-anchor','middle').attr('font-family','IBM Plex Mono').attr('font-size',9)
    .attr('fill','#2a3450').attr('letter-spacing',2).text('CUMULATIVE RELEASES');

  svg.append('text').attr('x',margin.left).attr('y',20)
    .attr('font-family','IBM Plex Mono').attr('font-size',9).attr('fill','#2a3450').attr('letter-spacing',2)
    .text('CUMULATIVE RELEASES OVER TIME — ● = MILESTONE — GOLD LINE = TOTAL');
}

// ── DOTS: every single release ──────────────────────────────────────────
function renderDots(fp) {
  const MONTH_W = 30;
  const months = [...new Set(DATA.monthly.map(m=>m.month))].sort();
  const totalW = Math.max(months.length * MONTH_W + 120, window.innerWidth - 290);
  const H = document.querySelector('.chart-wrap').clientHeight;
  const margin = { top: 55, right: 60, bottom: 70, left: 55 };
  const w = totalW - margin.left - margin.right;
  const h = H - margin.top - margin.bottom;

  const svg = d3.select('#chart').attr('width', totalW).attr('height', H);
  svg.selectAll('*').remove();
  const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

  // Y: by category
  const activeCatList = CATS.filter(c => activeCats.has(c));
  const yScale = d3.scalePoint().domain(activeCatList).range([20, h-20]).padding(0.5);
  const bandH = h / (activeCatList.length + 1);

  const xScale = d3.scaleTime()
    .domain([new Date('2017-01-01'), new Date('2026-04-01')]).range([0, w]);

  // Year bands
  const years = [2017,2018,2019,2020,2021,2022,2023,2024,2025,2026];
  years.forEach((yr,yi) => {
    const x0 = xScale(new Date(yr,0,1));
    const x1 = xScale(new Date(yr,11,31));
    if (yi%2===0) g.append('rect').attr('x',x0).attr('y',0).attr('width',x1-x0).attr('height',h).attr('fill','rgba(255,255,255,0.013)');
    g.append('text').attr('x',(x0+x1)/2).attr('y',-28)
      .attr('text-anchor','middle').attr('font-family','Bebas Neue').attr('font-size',17).attr('letter-spacing',3)
      .attr('fill', yi%2===0 ? '#3a4878' : '#2a3460').text(yr);
    g.append('line').attr('x1',x0).attr('x2',x0).attr('y1',-36).attr('y2',h).attr('stroke','#1a1a2c').attr('stroke-width',1);
  });

  // Category labels + horizontal guides
  activeCatList.forEach(c => {
    const cy = yScale(c);
    g.append('line').attr('x1',0).attr('x2',w).attr('y1',cy).attr('y2',cy).attr('stroke','#111120').attr('stroke-width',1);
    g.append('text').attr('x',-6).attr('y',cy).attr('text-anchor','end').attr('dominant-baseline','middle')
      .attr('font-family','IBM Plex Mono').attr('font-size',8).attr('fill',CAT_COLORS[c]).attr('opacity',0.8).text(c);
  });

  // Deterministic jitter
  const jitter = str => {
    let h = 5381;
    for (let i=0; i<str.length; i++) h = ((h<<5)+h)+str.charCodeAt(i);
    return ((h>>>0) % 1000) / 1000;
  };

  const tt = document.getElementById('tooltip');
  g.selectAll('.dot').data(fp).join('circle').attr('class','dot')
    .attr('cx', p => xScale(new Date(p.d+'T00:00:00')))
    .attr('cy', p => {
      const base = yScale(p.c) || h/2;
      return base + (jitter(p.t)-0.5) * bandH * 0.7;
    })
    .attr('r', 2.5)
    .attr('fill', p => CAT_COLORS[p.c])
    .attr('opacity', 0.5)
    .on('mouseover', function(event, p) {
      d3.select(this).attr('r',5).attr('opacity',1);
      tt.style.opacity='1';
      tt.innerHTML = `
        <div class="tt-month">${p.d}</div>
        <div class="tt-count" style="font-size:1rem;margin-bottom:4px">${p.t}</div>
        <div style="color:#5a6888;font-size:0.56rem;margin-bottom:3px">${p.i}</div>
        <div style="color:#33dd88;font-size:0.56rem">$${parseFloat(p.p).toFixed(2)}</div>
        <span style="display:inline-block;margin-top:5px;padding:1px 5px;border-radius:2px;font-size:0.5rem;background:${CAT_COLORS[p.c]}22;border:1px solid ${CAT_COLORS[p.c]}55;color:${CAT_COLORS[p.c]}">${p.c}</span>
      `;
      moveTooltip(event);
    })
    .on('mousemove', (e) => { moveTooltip(e); })
    .on('mouseout', function() {
      d3.select(this).attr('r',2.5).attr('opacity',0.5);
      tt.style.opacity='0';
    });

  svg.append('text').attr('x',margin.left).attr('y',20)
    .attr('font-family','IBM Plex Mono').attr('font-size',9).attr('fill','#2a3450').attr('letter-spacing',2)
    .text('EVERY RELEASE AS A DOT · HOVER FOR DETAILS · COLOR = CATEGORY');
}

// ── Tooltip helpers ─────────────────────────────────────────────────────
function showTooltip(event, month, mdata, cat, catVal, running) {
  const tt = document.getElementById('tooltip');
  const monthName = new Date(month+'-15').toLocaleString('default',{month:'long',year:'numeric'});
  let catBadges = '';
  if (mdata) {
    Object.entries(mdata.cats).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).forEach(([c,v]) => {
      catBadges += `<span class="tt-cat" style="background:${CAT_COLORS[c]}18;border:1px solid ${CAT_COLORS[c]}44;color:${CAT_COLORS[c]}">${c}: ${v}</span>`;
    });
  }
  let topTitles = '';
  if (mdata?.top?.length) {
    topTitles = mdata.top.slice(0,4).map(t =>
      `<div class="tt-title-item">${t.t.slice(0,42)}${t.t.length>42?'…':''}<span class="tt-title-instr"> · ${t.i}</span></div>`
    ).join('');
  }
  const runStr = running ? `<div style="color:#f0d000;margin-bottom:6px;font-size:0.65rem">Running total: <strong>${running.toLocaleString()}</strong></div>` : '';
  tt.innerHTML = `
    <div class="tt-month">${monthName}</div>
    <div class="tt-count">${mdata?.total || 0} <small>releases this month</small></div>
    ${runStr}
    <div class="tt-cats">${catBadges}</div>
    ${topTitles ? `<div class="tt-titles">${topTitles}</div>` : ''}
  `;
  tt.style.opacity = '1';
  moveTooltip(event);
}

function moveTooltip(event) {
  const tt = document.getElementById('tooltip');
  let x = event.clientX + 16, y = event.clientY - 20;
  if (x + 310 > window.innerWidth) x = event.clientX - 320;
  if (y + 220 > window.innerHeight) y = event.clientY - 220;
  tt.style.left = x + 'px';
  tt.style.top = y + 'px';
}

// ── Side panel ──────────────────────────────────────────────────────────
function setSideTab(tab, el) {
  sideTab = tab;
  document.querySelectorAll('.stab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderSide(filteredProducts(), filteredMonthly());
}

function renderSide(fp, monthly) {
  const body = document.getElementById('side-body');
  if (sideTab === 'instructors') {
    const counts = {};
    fp.forEach(p => { counts[p.i] = (counts[p.i]||0)+1; });
    const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,40);
    const maxN = sorted[0]?.[1]||1;
    body.innerHTML = sorted.map(([name,n],i) => `
      <div class="instr-item${hlInstructor===name?' hl':''}" onclick="toggleInstructor('${name.replace(/'/g,"\\'")}')">
        <span class="instr-rank">${i+1}</span>
        <div class="instr-info">
          <div class="instr-name">${name}</div>
          <div class="instr-bar" style="width:${Math.round(n/maxN*200)}px"></div>
        </div>
        <span class="instr-n">${n}</span>
      </div>`).join('');
  } else {
    // Months tab — sorted by most recent first
    const byMonth = {};
    fp.forEach(p => {
      const ym = p.d.slice(0,7);
      if (!byMonth[ym]) byMonth[ym] = [];
      byMonth[ym].push(p);
    });
    const sorted = Object.entries(byMonth).sort((a,b)=>b[0].localeCompare(a[0]));
    body.innerHTML = sorted.map(([ym, prods]) => {
      const maxMonth = Math.max(...Object.values(byMonth).map(v=>v.length));
      const barW = Math.round(prods.length/maxMonth*220);
      const titles = prods.slice(0,5).map(p=>`<div>· ${p.t.slice(0,36)}${p.t.length>36?'…':''} <span style="color:#3a4460">(${p.i})</span></div>`).join('');
      const more = prods.length > 5 ? `<div style="color:#2a3450">+ ${prods.length-5} more</div>` : '';
      return `<div class="month-row" onclick="this.classList.toggle('open')">
        <div class="month-top">
          <span class="month-name">${ym}</span>
          <span class="month-n">${prods.length}</span>
        </div>
        <div class="month-bar" style="width:${barW}px"></div>
        <div class="month-titles-list">${titles}${more}</div>
      </div>`;
    }).join('');
  }
}

function toggleInstructor(name) {
  hlInstructor = hlInstructor === name ? null : name;
  document.getElementById('search').value = '';
  searchQ = '';
  render();
}

// ── Controls ────────────────────────────────────────────────────────────
function setView(v) {
  currentView = v;
  ['bars','area','dots'].forEach(x => {
    document.getElementById('vbtn-'+x).classList.toggle('active', x===v);
  });
  render();
}

function onSearch() {
  searchQ = document.getElementById('search').value;
  hlInstructor = null;
  render();
}

// ── Drag-to-scroll on chart ─────────────────────────────────────────────
const scrollWrap = document.getElementById('scroll-wrap');
let isDragging = false, dragStartX, scrollStartX;
scrollWrap.addEventListener('mousedown', e => {
  if (e.target.tagName === 'circle' || e.target.tagName === 'rect') return;
  isDragging = true; dragStartX = e.clientX; scrollStartX = scrollWrap.scrollLeft;
  scrollWrap.style.cursor = 'grabbing';
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  scrollWrap.scrollLeft = scrollStartX - (e.clientX - dragStartX);
});
window.addEventListener('mouseup', () => { isDragging = false; scrollWrap.style.cursor = 'grab'; });

// ── Resize ──────────────────────────────────────────────────────────────
let resizeT;
window.addEventListener('resize', () => { clearTimeout(resizeT); resizeT = setTimeout(render, 150); });

// ── Init ────────────────────────────────────────────────────────────────
buildLegend();
render();
</script>
